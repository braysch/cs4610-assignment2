name: Apply Database Migrations

# Run on every push to the main branch (or master if that's the default).
on:
  push:
    branches:
      - main
      - master

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # supabase is already a devDependency — npm ci (above) makes it available
      # via npx, so no separate CLI install step is needed.

      # Link this checkout to the remote Supabase project and store the database
      # password in the project config. Passing --password here means db push
      # below can use the stored credentials without any manual URL construction.
      # The CLI resolves the correct pooler endpoint and username format for the
      # project automatically — no hardcoded hostnames needed.
      - name: Link Supabase project
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # Push every migration file under supabase/migrations/ that hasn't been
      # applied to the remote database yet.
      - name: Push migrations to remote
        run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
