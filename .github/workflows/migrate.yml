name: Apply Database Migrations

# Run on every push to the main branch (or master if that's the default).
on:
  push:
    branches:
      - main
      - master

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The official Supabase action installs the CLI globally, which is more
      # reliable than `npx supabase` because it avoids version resolution at
      # runtime and works without node_modules on PATH.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Link this checkout to the remote Supabase project. After this step,
      # subsequent `supabase` commands know which project to target.
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      # Push every migration file under supabase/migrations/ that hasn't been
      # applied to the remote database yet.
      #
      # Two problems solved here:
      #
      # 1. IPv6: GitHub Actions runners have no IPv6 route. The direct DB host
      #    (db.<ref>.supabase.co) has both A and AAAA records and Go's postgres
      #    driver prefers AAAA, which immediately fails. We resolve the IPv4
      #    address with Python and pin it in /etc/hosts so the driver only sees
      #    the A record.
      #
      # 2. Special characters in password: embedding the password directly in a
      #    shell-expanded URL string breaks if it contains @, $, #, etc. Python's
      #    urllib.parse.quote percent-encodes it safely before it touches the URL.
      - name: Push migrations to remote
        run: |
          DB_HOST="db.${SUPABASE_PROJECT_ID}.supabase.co"

          # Resolve to IPv4 and pin in /etc/hosts.
          IPV4=$(python3 -c "import socket; print(socket.getaddrinfo('${DB_HOST}', 5432, socket.AF_INET)[0][4][0])")
          echo "${IPV4} ${DB_HOST}" | sudo tee -a /etc/hosts

          # Build the connection URL with a percent-encoded password.
          DB_URL=$(python3 -c "
          import os, urllib.parse
          pw  = urllib.parse.quote(os.environ['SUPABASE_DB_PASSWORD'], safe='')
          ref = os.environ['SUPABASE_PROJECT_ID']
          print(f'postgresql://postgres:{pw}@db.{ref}.supabase.co:5432/postgres')
          ")

          supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
