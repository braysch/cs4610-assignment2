name: Apply Database Migrations

# Run on every push to the main branch (or master if that's the default).
on:
  push:
    branches:
      - main
      - master

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The official Supabase action installs the CLI globally, which is more
      # reliable than `npx supabase` because it avoids version resolution at
      # runtime and works without node_modules on PATH.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Link this checkout to the remote Supabase project. After this step,
      # subsequent `supabase` commands know which project to target.
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      # Push every migration file under supabase/migrations/ that hasn't been
      # applied to the remote database yet.
      #
      # We use --db-url with the direct host (db.<ref>.supabase.co:5432) instead
      # of --password alone. The default CLI behaviour routes through Supabase's
      # connection pooler (pooler.supabase.com) which uses transaction mode and
      # rejects SCRAM-SHA-256 auth. The direct host bypasses the pooler entirely.
      #
      # The password is URL-encoded via Python before being embedded in the
      # connection string, so special characters (@ # $ etc.) don't break parsing.
      - name: Push migrations to remote
        run: |
          DB_URL=$(python3 -c "
          import os, urllib.parse
          pw  = urllib.parse.quote(os.environ['SUPABASE_DB_PASSWORD'], safe='')
          ref = os.environ['SUPABASE_PROJECT_ID']
          print(f'postgresql://postgres:{pw}@db.{ref}.supabase.co:5432/postgres')
          ")
          supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
